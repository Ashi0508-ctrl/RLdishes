<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Page</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: url(https://static.vecteezy.com/system/resources/thumbnails/027/865/586/small/set-of-restaurant-doodles-food-and-drinks-on-black-background-vector.jpg);
}

/* GLASS CARD */
.container{
    display:flex;
    width:850px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius:20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.2);
    overflow:hidden;
    animation: fadeIn 1s ease-in-out;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform: translateY(30px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

/* PROFILE */
.profile{
    width:40%;
    padding:30px;
    text-align:center;
    color:#fff;
    border-right:1px solid rgba(255,255,255,0.2);
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #fff;
    margin-bottom:15px;
    transition:0.4s;
}

.profile img:hover{
    transform: scale(1.1);
}

.profile h3{
    margin-bottom:5px;
}

.profile p{
    font-size:14px;
    opacity:0.9;
    margin-bottom:10px;
}

/* SOCIAL ICONS */
.social-icons a{
    display:inline-block;
    margin:8px;
    color:#fff;
    font-size:18px;
    transition:0.3s;
}

.social-icons a:hover{
    color:#ffd369;
    transform: scale(1.2);
}

/* FORM */
.contact-form{
    width:60%;
    padding:30px;
    color:#fff;
}

.contact-form h2{
    margin-bottom:20px;
}

/* INPUT */
.input-box{
    margin-bottom:15px;
}

.input-box input,
.input-box textarea{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background: rgba(255,255,255,0.2);
    color:#fff;
    outline:none;
}

.input-box input::placeholder,
.input-box textarea::placeholder{
    color:#eee;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ffd369;
    color:#333;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e84393;
}

/* MOBILE */
@media(max-width:768px){
    .container{
        flex-direction:column;
        width:90%;
    }

    .profile{
        width:100%;
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.2);
    }

    .contact-form{
        width:100%;
    }
}
</style>

</head>

<body>

<div class="container">

    <!-- PROFILE -->
    <div class="profile">
        <img src="admin.jpg" alt="Owner Photo">
        <h3>Ravindu Lakzhan</h3>
        <p>BW132 Monitor</p>
        <p>ravindul413@gmail.com</p>

        <!-- SOCIAL LINKS -->
        <div class="social-icons">
            <a href="https://www.facebook.com/BWAERatnapura"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/britishway.rathnapura?igsh=YmVzbjV3azJocWd2"><i class="fab fa-instagram"></i></a>
            <a href="https://chat.whatsapp.com/IHr321wGywE0LLyktrxXjd?mode=gi_t"><i class="fab fa-whatsapp"></i></a>
            
        </div>
    </div>

    <!-- FORM -->
    <div class="contact-form">
        <h2>Contact Me & FeedBacks</h2>

        <form action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="6bf4da4b-45ae-4ca1-817a-4759b31ec5ba">
            <div class="input-box">
                <input type="text" placeholder="Your Name" name="name" required>
            </div>

            <div class="input-box">
                <input type="email" placeholder="Your Email" name="email" required>
            </div>

            <div class="input-box">
                <textarea rows="4" placeholder="Your Message" name="message" required></textarea>
            </div>
            
            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

</body>
</html>
